<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>打卡系統｜麻媽家・涼三伯・開拌</title>
<style>
:root {
  --bg:#0f1117; --card:#1a1d27; --card2:#21253a;
  --accent:#f5a623; --accent2:#e8891a;
  --green:#2ecc71; --red:#e74c3c; --blue:#3498db;
  --text:#eef0f8; --muted:#8892a4; --border:#2d3347; --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','PingFang TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}

.header{width:100%;background:linear-gradient(135deg,#1a1d27,#21253a);border-bottom:1px solid var(--border);padding:16px 20px 12px;text-align:center;position:sticky;top:0;z-index:10}
.header-brand{font-size:11px;color:var(--accent);letter-spacing:3px;margin-bottom:4px}
.header-title{font-size:18px;font-weight:700}

.clock-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;width:100%;display:flex;justify-content:space-between;align-items:center}
#live-clock{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:2px}
#live-date{font-size:12px;color:var(--muted);margin-top:2px}
.gps-bar{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 10px;background:var(--card2);border-radius:8px}
.gps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gps-dot.ok{background:var(--green);animation:pulse 2s infinite}
.gps-dot.err{background:var(--red)}
.gps-dot.loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.container{width:100%;max-width:480px;padding:20px 16px 40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-title{font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:14px}

/* Step 1: 輸入編號 */
.id-input{width:100%;background:var(--card2);border:2px solid var(--border);color:var(--text);padding:16px;border-radius:12px;font-size:24px;font-weight:700;outline:none;letter-spacing:4px;text-align:center;margin-bottom:10px}
.id-input:focus{border-color:var(--accent)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.numkey{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:16px;border-radius:10px;font-size:20px;font-weight:600;cursor:pointer;text-align:center;transition:all .1s}
.numkey:active{background:var(--accent);color:#fff;transform:scale(.96)}
.numkey.del{font-size:16px;color:var(--muted)}
.btn-confirm{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;padding:16px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}

/* Step 2: 員工確認 */
#emp-panel{display:none}
.emp-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;margin:0 auto 12px}
.emp-name{font-size:22px;font-weight:700;text-align:center}
.emp-store{font-size:13px;color:var(--accent);text-align:center;margin-top:4px}
.emp-id{font-size:11px;color:var(--muted);text-align:center;margin-top:2px}

/* 門市切換 */
#store-selector{display:none;margin-top:16px}
.store-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.store-toggle{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:14px;cursor:pointer;width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between}
.store-dropdown{display:none;background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-top:6px;overflow:hidden}
.store-option{padding:12px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.store-option:last-child{border-bottom:none}
.store-option:hover{background:#2d3347}
.store-code-badge{font-size:10px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-weight:700}

/* Step 3: 拍照 */
#photo-panel{display:none;margin-top:16px}
.photo-title{font-size:12px;color:var(--muted);margin-bottom:8px;text-align:center}
#camera-wrap{position:relative;border-radius:12px;overflow:hidden;background:#000;margin-bottom:10px}
#camera-video{width:100%;display:block;transform:scaleX(-1)}
#photo-preview{width:100%;border-radius:12px;display:none;margin-bottom:10px}
.photo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-snap{background:linear-gradient(135deg,#27ae60,#2ecc71);border:none;color:#fff;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.btn-retake{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:14px;border-radius:12px;font-size:14px;cursor:pointer}

/* 打卡按鈕 */
#action-panel{display:none;margin-top:16px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-action{padding:18px 10px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s}
.btn-action:active{transform:scale(.97)}
.btn-action .btn-icon{font-size:22px}
.btn-action.btn-clock-in {background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff}
.btn-action.btn-break-s  {background:linear-gradient(135deg,#1a6fa8,#3498db);color:#fff}
.btn-action.btn-break-e  {background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff}
.btn-action.btn-clock-out{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff}
.btn-action:disabled{opacity:.35;cursor:not-allowed}

/* 今日記錄 */
#today-records{display:none;margin-top:12px}
.rec-title{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:8px}
.rec-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.rec-item:last-child{border-bottom:none}
.rec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rec-dot.上班{background:var(--green)}
.rec-dot.下班{background:var(--red)}
.rec-dot.開始休息{background:var(--blue)}
.rec-dot.結束休息{background:#a29bfe}
.rec-type{flex:1;font-weight:600}
.rec-time{color:var(--muted);font-family:monospace}
.rec-store{font-size:11px;color:var(--accent)}

.btn-reset{width:100%;margin-top:12px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:10px;font-size:13px;cursor:pointer}

/* Toast */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2d3347;color:var(--text);padding:14px 24px;border-radius:30px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;pointer-events:none;opacity:0;transition:opacity .3s;max-width:90vw;text-align:center}
#toast.show{opacity:1}
#toast.success{background:#1a4a2e;border:1px solid var(--green);color:var(--green)}
#toast.error{background:#4a1a1a;border:1px solid var(--red);color:var(--red)}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">麻媽家・涼三伯・開拌</div>
  <div class="header-title">員工打卡系統</div>
</div>

<div class="clock-bar">
  <div>
    <div id="live-clock">00:00:00</div>
    <div id="live-date"></div>
  </div>
  <div class="gps-bar">
    <div class="gps-dot loading" id="gps-dot"></div>
    <span id="gps-text">GPS定位中...</span>
  </div>
</div>

<div class="container">

  <!-- Step 1: 輸入員工編號 -->
  <div class="card" id="id-card">
    <div class="card-title">👤 輸入員工編號</div>
    <input class="id-input" id="emp-id-input" type="text" maxlength="6" placeholder="- - - - - -" readonly>
    <div class="numpad">
      <button class="numkey" onclick="numPress('1')">1</button>
      <button class="numkey" onclick="numPress('2')">2</button>
      <button class="numkey" onclick="numPress('3')">3</button>
      <button class="numkey" onclick="numPress('4')">4</button>
      <button class="numkey" onclick="numPress('5')">5</button>
      <button class="numkey" onclick="numPress('6')">6</button>
      <button class="numkey" onclick="numPress('7')">7</button>
      <button class="numkey" onclick="numPress('8')">8</button>
      <button class="numkey" onclick="numPress('9')">9</button>
      <button class="numkey del" onclick="numClear()">清除</button>
      <button class="numkey" onclick="numPress('0')">0</button>
      <button class="numkey del" onclick="numDel()">⌫</button>
    </div>
    <button class="btn-confirm" onclick="lookupEmp()">查詢 →</button>
  </div>

  <!-- Step 2 & 3: 員工確認 + 拍照 + 打卡 -->
  <div class="card" id="emp-panel">
    <div class="card-title">✅ 員工確認</div>
    <div class="emp-avatar" id="emp-avatar">?</div>
    <div class="emp-name"  id="emp-name">-</div>
    <div class="emp-store" id="emp-store-label">-</div>
    <div class="emp-id"    id="emp-id-label">-</div>

    <!-- 跨店切換 -->
    <div id="store-selector">
      <div class="store-label">今天在其他門市？點此切換</div>
      <button class="store-toggle" onclick="toggleStoreDD()">
        <span id="store-dd-label">選擇門市</span><span>▾</span>
      </button>
      <div class="store-dropdown" id="store-dropdown"></div>
    </div>

    <!-- 拍照區 -->
    <div id="photo-panel">
      <div class="photo-title">📸 請拍攝本人自拍照（點下方按鈕）</div>
      <input type="file" id="photo-input" accept="image/*" capture="user" onchange="onPhotoSelected(event)">
      <img id="photo-preview" alt="預覽">
      <div class="photo-btns">
        <button class="btn-snap" onclick="document.getElementById('photo-input').click()">📸 拍照 / 選照片</button>
        <button class="btn-retake" id="btn-retake" style="display:none" onclick="retakePhoto()">重拍</button>
      </div>
    </div>

    <!-- 打卡按鈕 -->
    <div id="action-panel">
      <div class="actions">
        <button class="btn-action btn-clock-in"  onclick="doClock('上班')">
          <span class="btn-icon">☀️</span>上班打卡
        </button>
        <button class="btn-action btn-break-s"   onclick="doClock('開始休息')">
          <span class="btn-icon">☕</span>開始休息
        </button>
        <button class="btn-action btn-break-e"   onclick="doClock('結束休息')">
          <span class="btn-icon">🔔</span>結束休息
        </button>
        <button class="btn-action btn-clock-out" onclick="doClock('下班')">
          <span class="btn-icon">🌙</span>下班打卡
        </button>
      </div>
    </div>

    <!-- 今日記錄 -->
    <div id="today-records">
      <div class="rec-title">TODAY'S RECORDS</div>
      <div id="rec-list"></div>
    </div>

    <button class="btn-reset" onclick="resetAll()">← 換人打卡</button>
  </div>

</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  ⚙️  設定區
// ══════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIpkoa_U-A_VcLLQJ6F-tC6eFzG4TYGAXHgwoXWq0zkobkLgws9vhNW-EpI-zn15so/exec";
const GPS_RADIUS = 100; // 正式上線
const PHOTO_REQUIRED = true; // 是否強制拍照

const STORES = [
  {code:"M001",name:"麻媽家信義店",lat:25.043503,lng:121.575362},
  {code:"M002",name:"麻媽家內湖737店",lat:25.082091,lng:121.579240},
  {code:"M003",name:"麻媽家安居店",lat:25.020975,lng:121.553884},
  {code:"M004",name:"麻媽家東湖店",lat:25.069178,lng:121.616719},
  {code:"L001",name:"涼三伯東湖店",lat:25.072670,lng:121.611861},
  {code:"L002",name:"涼三伯東科店",lat:25.062485,lng:121.648597},
  {code:"K001",name:"開拌南軟店",lat:25.057866,lng:121.613068},
  {code:"HQ", name:"總部/中央廚房",lat:25.054288,lng:121.615685},
  {code:"PT", name:"兼職",lat:null,lng:null},
];
// ══════════════════════════════════════════════

let empData = null;
let currentStore = null;
let gpsPos = null;
let photoB64 = null;

// ── 時鐘 ───────────────────────────────────
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('live-clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('live-date').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（星期${days[now.getDay()]}）`;
}
setInterval(updateClock, 1000); updateClock();

// ── GPS ────────────────────────────────────
function initGPS() {
  if (!navigator.geolocation) { setGPS('err','不支援GPS'); return; }
  navigator.geolocation.watchPosition(
    pos => { gpsPos = pos; setGPS('ok', `GPS已定位（±${Math.round(pos.coords.accuracy)}m）`); },
    err => { gpsPos = null; setGPS('err', err.code===1 ? '請允許位置權限' : 'GPS無法定位'); },
    {enableHighAccuracy:true, maximumAge:10000}
  );
}
function setGPS(type, text) {
  document.getElementById('gps-dot').className = 'gps-dot ' + type;
  document.getElementById('gps-text').textContent = text;
}
function distanceM(lat1,lng1,lat2,lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── 數字鍵盤 ───────────────────────────────
function numPress(n) {
  const el = document.getElementById('emp-id-input');
  if (el.value.length < 6) el.value += n;
}
function numDel() {
  const el = document.getElementById('emp-id-input');
  el.value = el.value.slice(0,-1);
}
function numClear() { document.getElementById('emp-id-input').value = ''; }

// ── 查詢員工 ───────────────────────────────
async function lookupEmp() {
  const empId = document.getElementById('emp-id-input').value.trim();
  if (!empId) { showToast('error','請輸入員工編號'); return; }
  showToast('','查詢中...');
  try {
    const res = await api({action:'emp_info', emp_id:empId});
    if (!res.ok) { showToast('error', res.msg); return; }
    empData = res;
    currentStore = {code:res.store_code, name:res.store_name};
    showEmpPanel();
    loadTodayRecords();
  } catch(e) { showToast('error','網路錯誤，請重試'); }
}

// ── 顯示員工面板 ────────────────────────────
function showEmpPanel() {
  document.getElementById('id-card').style.display = 'none';
  document.getElementById('emp-panel').style.display = 'block';
  document.getElementById('emp-avatar').textContent = empData.emp_name[0];
  document.getElementById('emp-name').textContent = empData.emp_name;
  document.getElementById('emp-store-label').textContent = currentStore.name;
  document.getElementById('emp-id-label').textContent = 'ID：' + empData.emp_id;

  // 門市下拉
  const dd = document.getElementById('store-dropdown');
  dd.innerHTML = '';
  STORES.forEach(s => {
    const d = document.createElement('div');
    d.className = 'store-option';
    d.innerHTML = `<span class="store-code-badge">${s.code}</span>${s.name}`;
    d.onclick = () => selectStore(s);
    dd.appendChild(d);
  });
  document.getElementById('store-dd-label').textContent = currentStore.name;
  document.getElementById('store-selector').style.display = 'block';

  // 啟動相機
  if (PHOTO_REQUIRED) startCamera();
  else document.getElementById('action-panel').style.display = 'block';
}

function toggleStoreDD() {
  const dd = document.getElementById('store-dropdown');
  dd.style.display = dd.style.display==='block' ? 'none' : 'block';
}
function selectStore(s) {
  currentStore = {code:s.code, name:s.name};
  document.getElementById('store-dd-label').textContent = s.name;
  document.getElementById('emp-store-label').textContent = s.name;
  document.getElementById('store-dropdown').style.display = 'none';
  showToast('success','門市已切換：' + s.name);
  loadTodayRecords();
}

// ── 拍照（使用 file input，iOS/Android 都支援）──────
function startCamera() {
  document.getElementById('photo-panel').style.display = 'block';
}

function onPhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    // 壓縮照片
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 640;
      let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoB64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
      document.getElementById('photo-preview').src = canvas.toDataURL('image/jpeg', 0.6);
      document.getElementById('photo-preview').style.display = 'block';
      document.getElementById('btn-retake').style.display = 'block';
      document.getElementById('action-panel').style.display = 'block';
      showToast('success','照片已拍攝，請選擇打卡類型');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function retakePhoto() {
  photoB64 = null;
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('photo-preview').src = '';
  document.getElementById('btn-retake').style.display = 'none';
  document.getElementById('action-panel').style.display = 'none';
  document.getElementById('photo-input').value = '';
}

// ── 打卡 ───────────────────────────────────
async function doClock(type) {
  if (!empData) return;

  // GPS 驗證（測試帳號 9999 跳過）
  const isTestAccount = empData.emp_id === '9999';
  const store = STORES.find(s => s.code === currentStore.code);
  if (!isTestAccount && store && store.lat && GPS_RADIUS < 9999) {
    if (!gpsPos) { showToast('error','GPS尚未定位，請稍候'); return; }
    const dist = distanceM(gpsPos.coords.latitude, gpsPos.coords.longitude, store.lat, store.lng);
    if (dist > GPS_RADIUS) { showToast('error',`距離門市${Math.round(dist)}m，超出範圍`); return; }
  }

  const payload = {
    action: 'clock',
    emp_id: empData.emp_id,
    type: type,
    store_code: currentStore.code,
    lat:  gpsPos ? gpsPos.coords.latitude.toFixed(6)  : '',
    lng:  gpsPos ? gpsPos.coords.longitude.toFixed(6) : '',
    acc:  gpsPos ? Math.round(gpsPos.coords.accuracy) : '',
    device: /iPhone/.test(navigator.userAgent)?'iPhone':/Android/.test(navigator.userAgent)?'Android':'Other',
    photo: photoB64 || ''
  };
  console.log('photo size:', photoB64 ? photoB64.length : 'null');

  showToast('','打卡中...');
  try {
    const res = await api(payload);
    if (res.ok) {
      showToast('success', `${res.emp_name} ${res.time} ${res.msg}`);
      photoB64 = null;
      loadTodayRecords();
    } else {
      showToast('error', res.msg);
    }
  } catch(e) { showToast('error','網路錯誤，請重試'); }
}

// ── 今日記錄 ──────────────────────────────
async function loadTodayRecords() {
  try {
    const res = await api({action:'status', emp_id:empData.emp_id});
    if (!res.ok) return;
    const list = document.getElementById('rec-list');
    list.innerHTML = (!res.records || !res.records.length)
      ? '<div style="color:var(--muted);font-size:13px;padding:8px 0">今日尚無打卡記錄</div>'
      : res.records.map(r=>`
          <div class="rec-item">
            <div class="rec-dot ${r.type}"></div>
            <div class="rec-type">${r.type}</div>
            <div class="rec-store">${r.store}</div>
            <div class="rec-time">${String(r.time).substr(11,5)||r.time}</div>
          </div>`).join('');
    document.getElementById('today-records').style.display = 'block';
  } catch(e) {}
}

// ── 重置 ───────────────────────────────────
function resetAll() {
  empData = null; currentStore = null; photoB64 = null;
  document.getElementById('photo-input').value = '';
  document.getElementById('emp-id-input').value = '';
  document.getElementById('emp-panel').style.display = 'none';
  document.getElementById('id-card').style.display = 'block';
  document.getElementById('photo-panel').style.display = 'none';
  document.getElementById('action-panel').style.display = 'none';
  document.getElementById('today-records').style.display = 'none';
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('camera-wrap').style.display = 'block';
  document.getElementById('btn-snap').style.display = 'block';
  document.getElementById('btn-retake').style.display = 'none';
}

// ── API ────────────────────────────────────
function api(payload) {
  return fetch(APPS_SCRIPT_URL, {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(payload)
  }).then(r=>r.json());
}

// ── Toast ──────────────────────────────────
let toastTimer = null;
function showToast(type, msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + (type||'');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className=''; }, 3000);
}

initGPS();
</script>
</body>
